name: Docs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  docs:
    name: Documentation build and inventory checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust docs
        run: cargo doc --no-deps --all-features --locked

      - name: Check required architecture docs
        run: |
          test -s README.md
          test -s docs/business-strategy.md
          test -s docs/language-analysis.md
          test -s docs/architecture.md
          test -s docs/resolution-algorithm.md
          test -s docs/roadmap.md
          test -s docs/test-inventory.md
